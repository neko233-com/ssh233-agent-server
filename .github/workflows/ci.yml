name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  GO_VERSION: "1.26.x"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Unit tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: go test ./... -count=1 -coverprofile=coverage.out

      - name: Unit tests with race
        if: matrix.os == 'ubuntu-latest'
        run: go test ./... -count=1 -race

      - name: Unit tests
        if: matrix.os != 'ubuntu-latest'
        run: go test ./... -count=1

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: build binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build with version metadata
        env:
          VERSION: 0.0.0-ci.${{ github.run_number }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp || 'ci' }}
        run: |
          LDFLAGS="-s -w \
            -X github.com/neko233/ssh233-agent-server/internal/version.Version=${VERSION} \
            -X github.com/neko233/ssh233-agent-server/internal/version.Commit=${COMMIT} \
            -X github.com/neko233/ssh233-agent-server/internal/version.Date=${DATE}"
          mkdir -p bin
          go build -ldflags "${LDFLAGS}" -o bin/ssh233-server ./cmd/server
          go build -ldflags "${LDFLAGS}" -o bin/ssh233-agent ./cmd/agent
          ./bin/ssh233-server -version

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-ci-binaries
          path: bin/

  integration:
    name: integration smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run integration smoke
        run: bash scripts/ci-smoke.sh

  scripts:
    name: validate scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck scripts/*.sh

      - name: Bash syntax
        run: |
          bash -n scripts/install.sh
          bash -n scripts/ci-smoke.sh
          bash -n scripts/require-green-checks.sh
          bash -n scripts/test.sh
