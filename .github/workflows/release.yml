name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild (e.g. v0.1.0)"
        required: false
        type: string

permissions:
  contents: write

env:
  GO_VERSION: "1.26.x"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-checks:
    name: require CI green
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Verify required GitHub Checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/require-green-checks.sh "$(git rev-parse HEAD)"

  build:
    needs: verify-checks
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build artifacts
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.ver.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          LDFLAGS="-s -w \
            -X github.com/neko233/ssh233-agent-server/internal/version.Version=${VERSION#v} \
            -X github.com/neko233/ssh233-agent-server/internal/version.Commit=${COMMIT} \
            -X github.com/neko233/ssh233-agent-server/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          mkdir -p dist
          srv="ssh233-server-${GOOS}-${GOARCH}${ext}"
          agt="ssh233-agent-${GOOS}-${GOARCH}${ext}"

          go build -ldflags "${LDFLAGS}" -o "dist/${srv}" ./cmd/server
          go build -ldflags "${LDFLAGS}" -o "dist/${agt}" ./cmd/agent

          cp config.example.yaml dist/config.example.yaml
          cp README.md dist/README.md

          cd dist
          sha256sum "${srv}" > "${srv}.sha256"
          sha256sum "${agt}" > "${agt}.sha256"
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: publish GitHub Release
    needs: [verify-checks, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dist-*
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | sort

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
